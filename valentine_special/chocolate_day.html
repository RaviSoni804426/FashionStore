<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chocolate Day | Sweetness 🍫</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display&family=Poppins:wght@400;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.5)), url('assets/chocolate-day.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: Poppins, sans-serif;
            color: white;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            gap: 10px;
            min-height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding: max(20px, env(safe-area-inset-top)) 15px max(40px, env(safe-area-inset-bottom));
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 800px;
            /* Increased width slightly since no card constraints */
            padding: 2rem;
            text-align: center;
            position: relative;
            z-index: 10;
            /* Removed card styling */
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            margin-bottom: 20px;
            color: #ffeb3b;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        /* Scene - ldke ldki style */
        .scene {
            position: relative;
            height: 250px;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .character {
            position: absolute;
            bottom: 0;
            font-size: 6rem;
            transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.4));
        }

        #girl {
            right: 15%;
            transform: scaleX(-1);
            animation: girlBounce 2s ease-in-out infinite;
        }

        @keyframes girlBounce {

            0%,
            100% {
                transform: scaleX(-1) translateY(0);
            }

            50% {
                transform: scaleX(-1) translateY(-8px);
            }
        }

        #boy {
            left: -120px;
            transform: scaleX(-1);
        }

        .scene.active #boy {
            left: 30%;
            animation: boyWalk 1.2s ease-in-out 1;
        }

        @keyframes boyWalk {
            0% {
                left: -120px;
                bottom: 0;
            }

            25% {
                bottom: 15px;
            }

            50% {
                bottom: 0;
            }

            75% {
                bottom: 12px;
            }

            100% {
                left: 30%;
                bottom: 0;
            }
        }

        /* Chocolate in hand */
        #chocolate {
            position: absolute;
            font-size: 4.5rem;
            opacity: 0;
            transition: 1.2s cubic-bezier(0.65, 0.05, 0.36, 1);
            filter: drop-shadow(0 0 12px rgba(255, 235, 59, 0.6));
            animation: chocoGlow 2s infinite alternate;
        }

        @keyframes chocoGlow {
            from {
                filter: drop-shadow(0 0 8px rgba(255, 235, 59, 0.5));
            }

            to {
                filter: drop-shadow(0 0 18px rgba(255, 235, 59, 0.8));
            }
        }

        .message {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            margin-top: 50px;
            min-height: 60px;
            padding: 0 10px;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.9);
            font-weight: 500;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            background: #fff;
            margin-left: 3px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        .btn {
            padding: 14px 40px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(45deg, #8d6e63, #5d4037);
            color: white;
            cursor: pointer;
            margin: 15px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all .3s ease;
            box-shadow: 0 5px 15px rgba(93, 64, 55, 0.5);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            background: linear-gradient(45deg, #a1887f, #6d4c41);
            box-shadow: 0 8px 20px rgba(93, 64, 55, 0.6);
        }

        .btn.accent {
            background: linear-gradient(45deg, #FFD700, #ffca28);
            color: #3e2723;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
        }

        .btn.accent:hover {
            background: linear-gradient(45deg, #ffca28, #FFD700);
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.5);
        }

        .hidden {
            display: none;
        }

        @keyframes heartPop {
            0% {
                opacity: 0;
                transform: scale(0);
            }

            50% {
                opacity: 1;
                transform: scale(1.3);
            }

            100% {
                opacity: 0;
                transform: scale(1.5) translateY(-50px);
            }
        }

        /* Floating sweets */
        .particle {
            position: absolute;
            bottom: -20px;
            pointer-events: none;
            animation: floatUp linear infinite;
            opacity: 0;
            z-index: 1;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(0.5);
                opacity: 0;
            }

            20% {
                opacity: 0.8;
            }

            80% {
                opacity: 0.6;
            }

            100% {
                transform: translateY(-110vh) scale(1.2);
                opacity: 0;
            }
        }

        @media (max-width: 600px) {
            body {
                padding-top: 15px;
            }

            h1 {
                font-size: clamp(2rem, 8vw, 3rem);
            }

            .container {
                padding: 10px;
            }

            .scene {
                height: 200px;
            }

            .character {
                font-size: 4rem;
            }

            #chocolate {
                font-size: 2.8rem;
            }

            .message {
                font-size: 1rem;
                min-height: 50px;
            }

            .btn {
                padding: 12px 28px;
                font-size: 1rem;
            }
        }

        @media (max-width: 380px) {
            .character {
                font-size: 3.2rem;
            }

            .scene {
                height: 170px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1 id="title">Hey Choco-Pie! 🍫<br><span
                style="font-size: 1.5rem; color: #ffeb3b; font-family: 'Playfair Display', serif;">(Sweetesttt
                Rasmalai )</span></h1>

        <div class="scene" id="scene">
            <div id="girl" class="character">💃</div>
            <div id="boy" class="character">🕺</div>
            <div id="chocolate">🍫</div>
        </div>

        <div class="message" id="message"></div>

        <button class="btn" id="giveBtn">Give Chocolate 🍫</button>
        <button class="btn accent hidden" id="acceptBtn">Accept 💖</button>
    </div>

    <script>
        const scene = document.getElementById("scene");
        const boy = document.getElementById("boy");
        const girl = document.getElementById("girl");
        const chocolate = document.getElementById("chocolate");
        const giveBtn = document.getElementById("giveBtn");
        const acceptBtn = document.getElementById("acceptBtn");
        const message = document.getElementById("message");
        const title = document.getElementById("title");

        function typeText(text, cb) {
            let i = 0;
            message.innerHTML = "";
            let int = setInterval(() => {
                message.innerHTML = text.slice(0, i) + "<span class='cursor'></span>";
                i++;
                if (i > text.length) { clearInterval(int); if (cb) cb(); }
            }, 35);
        }

        function attachChocoToBoy() {
            const boyRect = boy.getBoundingClientRect();
            const sceneRect = scene.getBoundingClientRect();
            const handX = (boyRect.left - sceneRect.left) + (boyRect.width * 0.75);
            const handY = (boyRect.top - sceneRect.top) + (boyRect.height * 0.45);
            chocolate.style.left = handX + "px";
            chocolate.style.top = handY + "px";
            chocolate.style.opacity = 1;
        }

        function moveChocoToGirl() {
            const girlRect = girl.getBoundingClientRect();
            const sceneRect = scene.getBoundingClientRect();
            const handX = (girlRect.left - sceneRect.left) + (girlRect.width * 0.2);
            const handY = (girlRect.top - sceneRect.top) + (girlRect.height * 0.2);
            chocolate.style.left = handX + "px";
            chocolate.style.top = handY + "px";
            chocolate.style.transform = "rotate(20deg) scale(1.1)";
            chocolate.style.animation = "none";
        }

        giveBtn.onclick = () => {
            scene.classList.add("active");
            giveBtn.classList.add("hidden");

            setTimeout(() => {
                attachChocoToBoy();

                typeText("Chocolate Day hai, socha kuch meetha ho jaye! 🍫 Vaise tum khud hi chalti-firti Five Star ho... Solid but Sweet! 😉 Accept kar lo, warna main khud kha jaunga! 😜", () => {
                    acceptBtn.classList.remove("hidden");
                });
            }, 1200);
        };

        acceptBtn.onclick = () => {
            acceptBtn.classList.add("hidden");
            moveChocoToGirl();

            for (let i = 0; i < 8; i++) {
                setTimeout(() => {
                    const h = document.createElement('div');
                    h.innerText = '💖';
                    h.style.cssText = 'position:absolute; left:' + (50 + (Math.random() - 0.5) * 30) + '%; top:30%; font-size:2rem; animation:heartPop 1s ease-out forwards; z-index:20; pointer-events:none;';
                    document.body.appendChild(h);
                    setTimeout(() => h.remove(), 1200);
                }, i * 80);
            }

            setTimeout(() => {
                title.innerText = "Yayy! Sweetest Choice!! 💖";
                typeText("Good Decision! Ab life poori Dairy Milk Silk jaisi smooth rahegi. 🍫✨ (Sharing is caring, yaad rakhna! 😜) Happy Chocolate Day My Love! ❤️");
                confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 }, colors: ['#3e2723', '#FFD700', '#e91e63', '#fff'] });
            }, 1300);
        };

        function createFloatingParticles() {
            const particles = ['🍫', '✨', '💖', '🍬', '💫'];
            for (let i = 0; i < 25; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerText = particles[Math.floor(Math.random() * particles.length)];
                p.style.left = Math.random() * 100 + 'vw';
                p.style.fontSize = (Math.random() * 20 + 12) + 'px';
                p.style.animationDuration = (Math.random() * 10 + 8) + 's';
                p.style.animationDelay = (Math.random() * 5) + 's';
                document.body.appendChild(p);
            }
        }
        createFloatingParticles();
    </script>

</body>

</html>
