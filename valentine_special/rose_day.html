<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Rose 🌹</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #ff4081;
            --secondary: #d81b60;
            --glass: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-glow: 0 0 10px rgba(255, 64, 129, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.6)), url("assets/rose-day.jpg") center/cover no-repeat fixed;
            font-family: 'Poppins', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Falling Petals Overlay */
        #petals-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .petal {
            position: absolute;
            width: 15px;
            height: 15px;
            background: #ff4081;
            border-radius: 100% 0% 100% 0%;
            opacity: 0.7;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(720deg);
            }
        }

        /* Glassmorphism Container */
        .content-container {
            /* Removing all card-like properties */
            padding: 2rem;
            text-align: center;
            width: 100%;
            max-width: 800px;
            z-index: 10;
            position: relative;
        }



        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #ff80ab, #ff4081);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
            transition: all 0.5s ease;
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-style: italic;
            margin-bottom: 1.5rem;
            opacity: 0.9;
        }

        /* Animation Scene */
        .scene {
            height: 250px;
            position: relative;
            margin: 1rem 0;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .char {
            font-size: 5rem;
            position: absolute;
            bottom: 10px;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.4));
            user-select: none;
        }



        #boy {
            left: -150px;
            /* Start further back */
            transform: scaleX(-1);
        }

        #girl {
            right: 10%;
            transform: scaleX(-1);
        }

        .scene.start #boy {
            left: 28%;
            /* Smooth slide in */
        }

        /* Screne Kneel - Smooth transition from stand */
        .scene.kneel #boy {
            transform: scaleX(-1) translateY(30px) rotate(-20deg);
            /* Distinct kneel */
            filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.5));
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* The Magical Rose */
        #rose {
            position: absolute;
            width: 60px;
            opacity: 0;
            z-index: 20;
            transition: all 1.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            filter: drop-shadow(0 0 15px #ff4081);
        }

        /* Message Area */
        .message-box {
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            line-height: 1.6;
            margin: 1rem 0;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
            color: #fff;
        }

        /* Buttons */
        .btn {
            background: linear-gradient(45deg, #d81b60, #ff4081);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(216, 27, 96, 0.4);
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(216, 27, 96, 0.6);
        }

        .btn.hidden {
            display: none;
        }

        /* Floating Hearts on Success */
        .floater {
            position: absolute;
            font-size: 1.5rem;
            pointer-events: none;
            animation: floatUp 2s ease-out forwards;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }

            100% {
                transform: translateY(-150px) scale(0);
                opacity: 0;
            }
        }

        /* Success Rainbow Text */
        .rainbow-text {
            background: linear-gradient(to right, #ff4081, #FFD700, #ff80ab, #fff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s infinite linear;
            background-size: 200%;
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        /* Responsive */
        @media (max-width: 500px) {
            h1 {
                font-size: 2.5rem;
            }

            .scene {
                height: 180px;
            }

            .char {
                font-size: 3.5rem;
            }

            .scene.start #boy,
            .scene.kneel #boy {
                left: 15%;
            }

            #girl {
                right: 5%;
            }

            .card {
                padding: 1.5rem;
                width: 95%;
            }

            .message-box {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>

    <!-- Falling Petals Background -->
    <div id="petals-container"></div>

    <div class="content-container">
        <h1>Happy Rose Day</h1>
        <p class="subtitle">For My Dearest Sarika... 🌹</p>

        <div class="scene" id="scene">
            <div id="boy" class="char">🕺</div>
            <div id="girl" class="char">💃</div>

            <!-- SVG Rose -->
            <svg id="rose" viewBox="0 0 512 512">
                <path fill="#4CAF50"
                    d="M253.4 163.6c-9.6 6.8-22.3 2.9-29.2-6.8-6.8-9.6-2.9-22.3 6.8-29.2 24.5-17.5 54.4-17.5 78.9 0 9.6 6.8 13.6 19.6 6.8 29.2-6.8 9.6-19.6 13.6-29.2 6.8-8.2-5.9-18.1-5.9-24.1 0z" />
                <path fill="#388E3C"
                    d="M273 160c-11.8 0-21.3 9.6-21.3 21.3v192c0 11.8 9.6 21.3 21.3 21.3s21.3-9.6 21.3-21.3V181.3c0-11.7-9.5-21.3-21.3-21.3z" />
                <path fill="#e91e63"
                    d="M351.3 84.7c-25.1-12.8-54-10.4-78.3 4.2-24.3-14.6-53.2-17-78.3-4.2-38.3 19.5-54.2 66.8-35.4 105.3 18.7 38.3 64.6 54.6 103.5 36.4 4.3-2 8.4-4.5 12.2-7.3 3.8 2.8 7.9 5.3 12.2 7.3 38.9 18.2 84.8 1.9 103.5-36.4 18.8-38.5 2.9-85.8-35.4-105.3z" />
                <circle cx="273" cy="110" r="15" fill="#fce4ec" opacity="0.3" />
            </svg>
        </div>

        <div class="message-box">
            <span id="text"></span><span class="cursor">|</span>
        </div>

        <button id="giftBtn" class="btn">Offer Rose 🌹</button>
        <button id="acceptBtn" class="btn hidden">Yes, I Accept! 💖</button>
    </div>

    <script>
        // Init Falling Petals
        const petalContainer = document.getElementById('petals-container');
        for (let i = 0; i < 30; i++) {
            let petal = document.createElement('div');
            petal.className = 'petal';
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.animationDuration = (Math.random() * 3 + 4) + 's';
            petal.style.animationDelay = Math.random() * 5 + 's';
            petalContainer.appendChild(petal);
        }

        const scene = document.getElementById('scene');
        const boy = document.getElementById('boy');
        const girl = document.getElementById('girl');
        const rose = document.getElementById('rose');
        const textElement = document.getElementById('text');
        const giftBtn = document.getElementById('giftBtn');
        const acceptBtn = document.getElementById('acceptBtn');
        const title = document.querySelector('h1');

        function typeText(text, cb) {
            textElement.innerHTML = '';
            let i = 0;
            let timer = setInterval(() => {
                textElement.innerHTML += text.charAt(i);
                i++;
                if (i >= text.length) {
                    clearInterval(timer);
                    if (cb) cb();
                }
            }, 40);
        }

        // Helper to stop animation
        function stopAnimation(element) {
            element.style.animation = 'none';
        }

        giftBtn.addEventListener('click', () => {
            giftBtn.classList.add('hidden');

            // 1. Walk in
            scene.classList.add('start');

            setTimeout(() => {
                // Stop walking animation
                boy.style.animation = 'none';

                // 2. Kneel
                scene.classList.add('kneel');

                // 3. Show Rose
                // Recalculate positions carefully
                const boyRect = boy.getBoundingClientRect();
                const sceneRect = scene.getBoundingClientRect();

                // Relative to scene
                const handX = (boyRect.left - sceneRect.left) + boyRect.width * 0.85;
                const handY = (boyRect.top - sceneRect.top) + boyRect.height * 0.45;

                rose.style.left = handX + 'px';
                rose.style.top = handY + 'px';
                rose.style.opacity = '1';
                rose.style.transform = 'scale(1.2) rotate(-10deg)';

                // 4. Message
                const msg = "My Dearest Sarika... Like this rose, my love for you blooms more every day. Will you accept this small token of my infinite love? 🌹";
                typeText(msg, () => acceptBtn.classList.remove('hidden'));

            }, 1200); // Increased time for walk
        });

        acceptBtn.addEventListener('click', () => {
            acceptBtn.classList.add('hidden');

            // 1. Move Rose to Girl
            const handX = girl.offsetLeft + girl.offsetWidth * 0.1;
            const handY = girl.offsetTop + girl.offsetHeight * 0.3;

            rose.style.left = handX + 'px';
            rose.style.top = handY + 'px';
            rose.style.transform = 'scale(1.4) rotate(0deg)';

            // 2. Success
            setTimeout(() => {
                scene.classList.remove('kneel'); // Stand up

                // Celebration
                confetti({
                    particleCount: 200, behavior: 'decorative',
                    spread: 90, origin: { y: 0.6 },
                    colors: ['#ff4081', '#ffffff', '#e91e63']
                });

                title.innerText = "She Said Yes! 💖";
                title.classList.add('rainbow-text');

                typeText("You are the reason my world is beautiful. Happy Rose Day, My Love! Forever Yours. ❤️");

                // Floating Hearts
                setInterval(() => {
                    const h = document.createElement('div');
                    h.className = 'floater';
                    h.innerHTML = '❤️';
                    h.style.left = Math.random() * 90 + '%';
                    h.style.top = '60%';
                    document.querySelector('.content-container').appendChild(h);
                    setTimeout(() => h.remove(), 2000);
                }, 400);

            }, 1500);
        });
    </script>
</body>

</html>
