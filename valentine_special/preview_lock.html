<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locked Preview (Simulation)</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=6.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* [Copying styles from index.html] */
        body {
            margin: 0;
            overflow-x: hidden;
            font-family: 'Poppins', sans-serif;
            color: #fff;
        }

        .floral-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1597848212624-a19eb35e2651?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center bottom;
            z-index: -2;
            filter: brightness(0.8) saturate(1.1);
        }

        .warm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.3), rgba(60, 40, 0, 0.6));
            z-index: -1;
            pointer-events: none;
        }

        .hero-container {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero-title {
            font-family: 'Cinzel', serif;
            font-size: 4rem;
            color: #FFF;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            margin: 0;
        }

        .hero-sub {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: #FFD700;
            margin-top: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
        }

        #gallery {
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto 60px;
        }

        .grid-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
        }

        .memory-card {
            height: 320px;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            color: white;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .memory-card:hover {
            transform: translateY(-10px) scale(1.02);
            z-index: 10;
        }

        .card-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            transition: transform 0.5s ease;
        }

        .memory-card:hover .card-bg {
            transform: scale(1.1);
        }

        .theme-rose .card-bg {
            background: linear-gradient(135deg, #ff9a9e 0%, #ff5252 100%);
        }

        .theme-propose .card-bg {
            background: linear-gradient(135deg, #141E30 0%, #243B55 100%);
        }

        .theme-propose {
            border: 1px solid #FFD700;
        }

        .theme-propose .card-date {
            color: #FFD700 !important;
        }

        .theme-choco .card-bg {
            background: linear-gradient(135deg, #3e2723 0%, #5d4037 100%);
        }

        .theme-teddy .card-bg {
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
        }

        .theme-teddy .card-title {
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .theme-promise .card-bg {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .theme-hug .card-bg {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
        }

        .theme-hug .card-title {
            color: #d35400;
        }

        .theme-hug .card-icon {
            color: #d35400;
        }

        .theme-hug .card-date {
            color: #bf360c !important;
        }

        .theme-kiss .card-bg {
            background: linear-gradient(135deg, #870000 0%, #190a05 100%);
        }

        .theme-valentine .card-bg {
            background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%);
        }

        .card-content {
            position: relative;
            z-index: 2;
            padding: 20px;
        }

        .card-icon {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 15px;
            filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.2));
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .memory-card:hover .card-icon {
            transform: scale(1.3) rotate(10deg);
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            margin: 0;
        }

        .card-date {
            font-size: 0.9rem;
            margin-top: 5px;
            opacity: 0.9;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .petals {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .petal {
            position: absolute;
            width: 15px;
            height: 15px;
            background: #FFD700;
            border-radius: 50% 0 50% 0;
            opacity: 0.6;
            animation: fall 10s linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg) translateX(0);
            }

            100% {
                transform: translateY(110vh) rotate(360deg) translateX(100px);
            }
        }

        /* Locked State */
        .memory-card.locked {
            filter: grayscale(1) opacity(0.7);
            cursor: not-allowed;
            pointer-events: all;
        }

        .memory-card.locked:hover {
            transform: none;
            box-shadow: none;
        }

        .memory-card.locked .card-icon {
            animation: none;
        }

        @media (max-width: 768px) {
            .hero-title {
                font-size: 2.5rem;
                padding: 0 10px;
            }

            .hero-sub {
                font-size: 1.2rem;
            }

            .grid-section {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 20px;
                padding: 0 15px;
            }

            .memory-card {
                height: 220px;
                border-radius: 15px;
            }

            .card-icon {
                font-size: 2.5rem;
            }

            .card-title {
                font-size: 1.2rem;
            }

            .card-date {
                font-size: 0.8rem;
            }

            #gallery {
                padding: 20px 10px;
            }
        }
    </style>
</head>

<body>

    <div class="floral-bg"></div>
    <div class="warm-overlay"></div>
    <div class="petals" id="petals"></div>

    <div class="hero-container">
        <div>
            <h1 class="hero-title">Preview: All Locked</h1>
            <p class="hero-sub">(This is how it looks before the dates arrive)</p>
        </div>
    </div>

    <div id="gallery">
        <div class="grid-section">
            <a href="rose_day.html" class="memory-card theme-rose" data-date="7">
                <div class="card-bg"></div>
                <div class="card-content">
                    <span class="card-icon">🌹</span>
                    <h3 class="card-title">Rose Day</h3>
                    <p class="card-date">7 Feb</p>
                </div>
            </a>
            <a href="propose_day.html" class="memory-card theme-propose" data-date="8">
                <div class="card-bg"></div>
                <div class="card-content">
                    <span class="card-icon">💍</span>
                    <h3 class="card-title">Propose Day</h3>
                    <p class="card-date">8 Feb</p>
                </div>
            </a>
            <a href="chocolate_day.html" class="memory-card theme-choco" data-date="9">
                <div class="card-bg"></div>
                <div class="card-content">
                    <span class="card-icon">🍫</span>
                    <h3 class="card-title">Chocolate Day</h3>
                    <p class="card-date">9 Feb</p>
                </div>
            </a>
            <a href="teddy_day.html" class="memory-card theme-teddy" data-date="10">
                <div class="card-bg"></div>
                <div class="card-content">
                    <span class="card-icon">🧸</span>
                    <h3 class="card-title">Teddy Day</h3>
                    <p class="card-date">10 Feb</p>
                </div>
            </a>
            <a href="promise_day.html" class="memory-card theme-promise" data-date="11">
                <div class="card-bg"></div>
                <div class="card-content">
                    <span class="card-icon">🤝</span>
                    <h3 class="card-title">Promise Day</h3>
                    <p class="card-date">11 Feb</p>
                </div>
            </a>
            <a href="hug_day.html" class="memory-card theme-hug" data-date="12">
                <div class="card-bg"></div>
                <div class="card-content">
                    <span class="card-icon">🤗</span>
                    <h3 class="card-title">Hug Day</h3>
                    <p class="card-date">12 Feb</p>
                </div>
            </a>
            <a href="kiss_day.html" class="memory-card theme-kiss" data-date="13">
                <div class="card-bg"></div>
                <div class="card-content">
                    <span class="card-icon">💋</span>
                    <h3 class="card-title">Kiss Day</h3>
                    <p class="card-date">13 Feb</p>
                </div>
            </a>
            <a href="valentine_day.html" class="memory-card theme-valentine" data-date="14">
                <div class="card-bg"></div>
                <div class="card-content">
                    <span class="card-icon">💘</span>
                    <h3 class="card-title">Valentine's Day</h3>
                    <p class="card-date">14 Feb</p>
                </div>
            </a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>
    <script>
        VanillaTilt.init(document.querySelectorAll(".memory-card"), {
            max: 15,
            speed: 400,
            glare: true,
            "max-glare": 0.4,
            scale: 1.05
        });

        const petalContainer = document.getElementById('petals');
        for (let i = 0; i < 25; i++) {
            const p = document.createElement('div');
            p.className = 'petal';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = Math.random() * 5 + 8 + 's';
            p.style.animationDelay = Math.random() * 5 + 's';
            p.style.background = Math.random() > 0.5 ? '#FFD700' : '#FFF';
            petalContainer.appendChild(p);
        }

        document.addEventListener('DOMContentLoaded', () => {
            // SIMULATION: Set Date to Feb 1st
            const currentMonth = 1; // Feb
            const currentDate = 1;  // All should be locked

            const cards = document.querySelectorAll('.memory-card');

            cards.forEach(card => {
                const targetDate = parseInt(card.getAttribute('data-date'));
                let isLocked = false;

                if (currentDate < targetDate) {
                    isLocked = true;
                }

                if (isLocked) {
                    card.classList.add('locked');
                    card.setAttribute('title', `Unlocks on Feb ${targetDate}`);
                    const originalHref = card.getAttribute('href');
                    card.removeAttribute('href');
                    card.style.cursor = 'not-allowed';

                    card.addEventListener('click', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        alert(`Sabar ka phal meetha hota hai! 😜\nYe surprise Feb ${targetDate} ko open hoga! 💖`);
                    });
                }
            });
        });
    </script>
</body>

</html>
