<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiss Day | Trust & Love 💋</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@300;400;500&display=swap"
        rel="stylesheet">

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">

    <style>
        :root {
            --primary: #d81b60;
            --soft-pink: #fce4ec;
            --gold: #FFD700;
        }

        body {
            /* Custom Kiss Day Background */
            /* Aesthetic Dark/Moody Couple Kissing Background */
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.5)), url('assets/kiss_day.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Center vertically if space allows */
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            color: #ffebee;
            position: relative;
            /* Allow scrolling */
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 0;
            /* Add padding for scroll space */
        }

        /* Ambient Glow */
        .glow-overlay {
            position: fixed;
            /* Fixed so it doesn't scroll away weirdly */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vh;
            background: radial-gradient(circle, rgba(216, 27, 96, 0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: pulse-glow 4s ease-in-out infinite alternate;
        }

        @keyframes pulse-glow {
            from {
                opacity: 0.5;
                transform: translate(-50%, -50%) scale(0.9);
            }

            to {
                opacity: 0.8;
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        /* Main Card */
        /* Main Card - Transparent Container */
        .kiss-card {
            z-index: 10;
            text-align: center;
            padding: 20px;
            /* Removed background, border, shadow for seamless look */
            max-width: 800px;
            width: 100%;
        }

        /* Animation Classes */
        .anim-text {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease-out forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            /* Larger */
            color: #ff80ab;
            margin-bottom: 20px;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.8);
            /* Stronger shadow */
            opacity: 0;
            /* Handled by anim-text if added */
        }

        p {
            font-size: 1.3rem;
            /* Larger */
            line-height: 1.8;
            margin-bottom: 30px;
            color: #fff;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.9);
            /* Text shadow for readability */
            font-weight: 500;
        }

        .highlight-text {
            color: var(--gold);
            font-weight: 600;
        }

        /* Interactive Kiss Emoji */
        .kiss-icon-container {
            position: relative;
            height: 120px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .big-kiss {
            font-size: 5rem;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 20px rgba(216, 27, 96, 0.6));
        }

        .big-kiss:hover {
            transform: scale(1.25) rotate(-5deg);
            filter: drop-shadow(0 0 30px rgba(216, 27, 96, 0.8));
        }

        .big-kiss:active {
            transform: scale(0.95);
        }

        /* Flying Kisses */
        .flying-kiss {
            position: absolute;
            font-size: 2rem;
            pointer-events: none;
            opacity: 0;
            animation: flyKiss 1.5s ease-out forwards;
        }

        @keyframes flyKiss {
            0% {
                transform: translate(0, 0) scale(0.5);
                opacity: 0;
            }

            20% {
                opacity: 1;
                transform: translate(0, -20px) scale(1.2);
            }

            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        /* Button */
        .btn-action {
            background: linear-gradient(45deg, #d81b60, #ff4081);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(216, 27, 96, 0.4);
            transition: all 0.3s;
        }

        .btn-action:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(216, 27, 96, 0.6);
        }

        /* Success Message */
        .success-msg {
            margin-top: 20px;
            font-size: 1.2rem;
            color: #ff80ab;
            font-style: italic;
            opacity: 0;
            transition: opacity 0.5s;
        }
    </style>
</head>

<body>

    <div class="glow-overlay"></div>

    <div class="kiss-card">
        <div class="kiss-icon-container">
            <div class="big-kiss" id="mainKiss" onclick="sendKiss()">💋</div>
        </div>

        <h1 class="anim-text" style="animation-delay: 0.2s;">Happy Kiss Day(Our fav.)</h1>
        <p class="anim-text" style="animation-delay: 1s;">
            To my favorite person, <strong>Sarika</strong>,<br>
            Har kiss ek vaada hai—Hamesha aapke saath rehne ka.
        </p>

        <p class="anim-text"
            style="font-size: 1.1rem; opacity: 0; margin-bottom: 40px; animation-delay: 2.5s; font-style: italic;">
            "Aapki smile hi meri favorite chiz hai, aur ye flying kiss bas uss smile ke liye." 😘
        </p>

        <button class="btn-action anim-text" style="animation-delay: 3.5s; opacity: 0;" onclick="sendKiss()">Send a
            Flying Kiss 😘</button>

        <div class="success-msg" id="successMsg">Caught it! Keeps me smiling. ❤️</div>

        <div style="margin-top: 25px;">
            <a href="index.html" style="color: rgba(255,255,255,0.4); text-decoration: none; font-size: 0.9rem;">Back to
                Home</a>
        </div>
    </div>

    <script>
        let kissCount = 0;

        function sendKiss() {
            kissCount++;
            const btn = document.querySelector('.btn-action');
            const mainKiss = document.getElementById('mainKiss');
            const successMsg = document.getElementById('successMsg');

            // Animate Main Icon
            mainKiss.style.transform = "scale(1.3)";
            setTimeout(() => mainKiss.style.transform = "scale(1)", 200);

            // Create Flying Kisses
            for (let i = 0; i < 5; i++) {
                createFlyingKiss();
            }

            if (kissCount === 1 || kissCount % 5 === 0) {
                confetti({
                    particleCount: 130,
                    spread: 90,
                    origin: { y: 0.5 },
                    colors: ['#ff4081', '#ff80ab', '#ffffff', '#FFD700']
                });
            }

            // Update Text
            if (kissCount === 1) {
                successMsg.style.opacity = '1';
                btn.innerText = "Send Another? 😉";
            } else if (kissCount > 1) {
                successMsg.innerText = "Bas bas Madam, I'm blushing! 🙈❤️";
            }
        }

        function createFlyingKiss() {
            const el = document.createElement('div');
            el.innerHTML = '😘';
            el.className = 'flying-kiss';

            // Random direction
            const angle = Math.random() * Math.PI * 2;
            const distance = 100 + Math.random() * 150;
            const tx = Math.cos(angle) * distance + 'px';
            const ty = Math.sin(angle) * distance - 100 + 'px'; // Tend towards top

            el.style.setProperty('--tx', tx);
            el.style.setProperty('--ty', ty);

            // Start from center of icon
            const rect = document.getElementById('mainKiss').getBoundingClientRect();
            // We need relative position to the card or body...
            // Simplest is to append to the container and position absolute center
            const container = document.querySelector('.kiss-icon-container');
            el.style.left = '50%';
            el.style.top = '50%';

            container.appendChild(el);

            setTimeout(() => el.remove(), 1500);
        }
    </script>
</body>

</html>
